apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  namespace: local
spec:
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /actuator
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: health-hazard-tracker-local-service
          port: 8080
  parentRefs:
    - name: {{ .Release.Name }}-gateway
